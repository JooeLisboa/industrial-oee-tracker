services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: oee
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: ./apps/api
    env_file:
      - .env
      - ./apps/api/.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@db:5432/oee}
      FLASK_APP: app
      FLASK_ENV: development
    ports:
      - "${API_PORT:-5000}:5000"
    depends_on:
      - db
    command: bash -lc "flask db upgrade || true && python seed.py && flask run --host=0.0.0.0 --port=5000"

  web:
    build: ./apps/web
    env_file:
      - ./apps/web/.env
    ports:
      - "${WEB_PORT:-5173}:5173"
    depends_on:
      - api
    command: npm run dev -- --host 0.0.0.0 --port 5173

volumes:
  pgdata:
