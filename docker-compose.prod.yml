services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: oee
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d oee"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: ./apps/api
    env_file:
      - .env
      - ./apps/api/.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@db:5432/oee}
      FLASK_APP: app
      FLASK_ENV: production
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10
    command: >
      bash -lc '
      if [ -d migrations ]; then flask db upgrade; fi &&
      python seed.py &&
      gunicorn -w 2 -b 0.0.0.0:5000 app:app'

  web:
    build:
      context: ./apps/web
      target: production
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 8

volumes:
  pgdata:
